<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>GlobalVoice · Login</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(135deg, #0b1120 0%, #19233c 100%);
      font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    /* card principal – proporção próxima à referência (729x737) mas responsivo */
    .login-card {
      max-width: 460px;
      width: 100%;
      background: rgba(255, 255, 255, 0.98);
      backdrop-filter: blur(0px);
      border-radius: 2.5rem;
      box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.35), 0 8px 18px rgba(0, 0, 0, 0.1);
      padding: 2.2rem 2rem 2.5rem;
      transition: all 0.2s ease;
    }

    /* logo / título estilizado */
    .login-header {
      text-align: center;
      margin-bottom: 2rem;
    }

    .login-header h1 {
      font-size: 2rem;
      font-weight: 700;
      background: linear-gradient(120deg, #1f2b48, #2c3e6d);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      letter-spacing: -0.3px;
    }

    .login-header .sub {
      color: #5a687c;
      font-size: 0.85rem;
      margin-top: 0.5rem;
      font-weight: 500;
    }

    /* campos do formulário */
    .input-group {
      margin-bottom: 1.5rem;
      display: flex;
      flex-direction: column;
    }

    .input-group label {
      font-size: 0.85rem;
      font-weight: 600;
      color: #1f2a44;
      margin-bottom: 0.4rem;
      letter-spacing: -0.2px;
    }

    .input-group input {
      padding: 0.9rem 1rem;
      border-radius: 1.25rem;
      border: 1.5px solid #e2e8f0;
      background-color: #ffffff;
      font-size: 1rem;
      font-family: inherit;
      transition: all 0.2s;
      outline: none;
      color: #0f172a;
    }

    .input-group input:focus {
      border-color: #3b6ea0;
      box-shadow: 0 0 0 3px rgba(59, 110, 160, 0.2);
    }

    /* opções adicionais (remember + forgot) */
    .options-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin: 0.5rem 0 1.8rem 0;
      flex-wrap: wrap;
      gap: 0.8rem;
    }

    .checkbox-label {
      display: flex;
      align-items: center;
      gap: 0.55rem;
      cursor: pointer;
      font-size: 0.9rem;
      color: #2c3e5c;
      font-weight: 500;
    }

    .checkbox-label input {
      width: 1.1rem;
      height: 1.1rem;
      cursor: pointer;
      accent-color: #2c5a7a;
    }

    .forgot-link {
      color: #2c5a7a;
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 500;
      transition: color 0.2s;
    }

    .forgot-link:hover {
      color: #0f2b44;
      text-decoration: underline;
    }

    /* botão principal */
    .login-btn {
      width: 100%;
      background: #1f2f4f;
      border: none;
      padding: 0.9rem;
      border-radius: 2rem;
      font-weight: 700;
      font-size: 1rem;
      color: white;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.25s, transform 0.1s;
      margin-bottom: 1.2rem;
      box-shadow: 0 6px 14px rgba(28, 45, 75, 0.25);
    }

    .login-btn:hover {
      background: #2c456e;
      transform: translateY(-1px);
    }

    .login-btn:active {
      transform: translateY(1px);
    }

    /* rodapé com mensagem de erro ou demo (opcional) */
    .demo-note {
      text-align: center;
      font-size: 0.75rem;
      color: #7c8aa2;
      margin-top: 1.2rem;
      border-top: 1px solid #edf2f7;
      padding-top: 1.2rem;
    }

    /* responsividade */
    @media (max-width: 500px) {
      .login-card {
        padding: 1.8rem 1.5rem 2rem;
      }
      .login-header h1 {
        font-size: 1.8rem;
      }
      .options-row {
        flex-direction: column;
        align-items: flex-start;
      }
    }

    /* validação visual simples */
    .error-message {
      color: #d14545;
      font-size: 0.75rem;
      margin-top: 0.3rem;
      margin-left: 0.5rem;
      display: none;
    }

    /* estilo para o card parecer com a referência (proporção) */
    @media (min-width: 760px) {
      .login-card {
        max-width: 440px;
      }
    }
  </style>
</head>
<body>
<div class="login-card">
  <div class="login-header">
    <h1>GlobalVoice</h1>
    <div class="sub">Acesse sua conta</div>
  </div>

  <form id="loginForm" action="#" method="post">
    <div class="input-group">
      <label for="email">Email</label>
      <input type="email" id="email" name="email" placeholder="usuario@exemplo.com" autocomplete="email" required>
    </div>

    <div class="input-group">
      <label for="password">Senha</label>
      <input type="password" id="password" name="password" placeholder="••••••••" autocomplete="current-password" required>
    </div>

    <div class="options-row">
      <label class="checkbox-label">
        <input type="checkbox" id="remember" name="remember">
        <span>Lembrar-me</span>
      </label>
      <a href="#" class="forgot-link" id="forgotPasswordLink">Esqueceu a senha?</a>
    </div>

    <button type="submit" class="login-btn">Login</button>

    <div id="formFeedback" style="text-align: center; font-size: 0.8rem; color: #b91c1c; min-height: 1.6rem;"></div>
  </form>

  <div class="demo-note">
    🔐 Credenciais demo: <strong>demo@globalvoice.com</strong> / qualquer senha (6+ caracteres)
  </div>
</div>

<script>
  (function() {
    const form = document.getElementById('loginForm');
    const feedbackDiv = document.getElementById('formFeedback');
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');
    const rememberCheck = document.getElementById('remember');

    // Helper para mostrar mensagem de erro/sucesso simulada
    function showMessage(msg, isError = true) {
      feedbackDiv.textContent = msg;
      feedbackDiv.style.color = isError ? '#d14545' : '#2c6e4f';
      if (!isError) {
        setTimeout(() => {
          if (feedbackDiv.textContent === msg) feedbackDiv.textContent = '';
        }, 2500);
      } else {
        setTimeout(() => {
          if (feedbackDiv.textContent === msg) feedbackDiv.textContent = '';
        }, 3000);
      }
    }

    // Carregar "lembrar email" se existir no localStorage (simulação de persistência)
    function loadRememberedEmail() {
      const savedEmail = localStorage.getItem('globalvoice_remembered_email');
      const savedRemember = localStorage.getItem('globalvoice_remember_check');
      if (savedRemember === 'true' && savedEmail) {
        emailInput.value = savedEmail;
        rememberCheck.checked = true;
      } else {
        rememberCheck.checked = false;
      }
    }

    // Salvar preferência de "lembrar-me"
    function persistRemember(email, rememberMe) {
      if (rememberMe && email) {
        localStorage.setItem('globalvoice_remembered_email', email);
        localStorage.setItem('globalvoice_remember_check', 'true');
      } else {
        localStorage.removeItem('globalvoice_remembered_email');
        localStorage.setItem('globalvoice_remember_check', 'false');
      }
    }

    // validação simples front-end
    function validateForm(email, password) {
      if (!email.trim()) {
        showMessage('Por favor, informe o e-mail.', true);
        emailInput.focus();
        return false;
      }
      if (!email.includes('@') || !email.includes('.')) {
        showMessage('Insira um e-mail válido (ex: nome@dominio.com).', true);
        emailInput.focus();
        return false;
      }
      if (!password.trim()) {
        showMessage('A senha não pode estar vazia.', true);
        passwordInput.focus();
        return false;
      }
      if (password.length < 4) {
        showMessage('A senha deve ter pelo menos 4 caracteres (apenas para demonstração).', true);
        passwordInput.focus();
        return false;
      }
      return true;
    }

    // Simular requisição de login (integração futura com backend real)
    function fakeLoginRequest(email, password, remember) {
      // Nesta versão front-end, apenas simulamos sucesso se email for "demo@globalvoice.com"
      // ou qualquer email válido + senha com comprimento >=4 (apenas para fluxo demonstrativo)
      return new Promise((resolve) => {
        setTimeout(() => {
          // Exemplo: aceita qualquer email/senha que passe validação, mas destaca demo
          if (email === 'demo@globalvoice.com' || (email.includes('@') && password.length >= 4)) {
            resolve({ success: true, message: 'Login bem-sucedido! Redirecionando...' });
          } else {
            resolve({ success: false, message: 'Credenciais inválidas. Tente demo@globalvoice.com' });
          }
        }, 800);
      });
    }

    // Evento de submit
    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      const email = emailInput.value.trim();
      const password = passwordInput.value;
      const remember = rememberCheck.checked;

      if (!validateForm(email, password)) return;

      // desabilitar botão durante chamada simulada
      const btn = form.querySelector('.login-btn');
      const originalText = btn.textContent;
      btn.disabled = true;
      btn.textContent = 'Entrando...';
      showMessage('Verificando credenciais...', false);

      try {
        const result = await fakeLoginRequest(email, password, remember);
        if (result.success) {
          persistRemember(email, remember);
          showMessage(result.message, false);
          // simular redirecionamento após 1.2s (para dashboard ou home)
          setTimeout(() => {
            alert('✅ Demonstração: redirecionamento para o painel GlobalVoice.\n(integração com backend em desenvolvimento)');
            // Em produção, redirecionar para página principal ou extensão
            // window.location.href = '/dashboard';
            btn.disabled = false;
            btn.textContent = originalText;
            // Resetar formulário apenas se quiser manter clean state
            // Aqui optamos por não resetar para preservar experiência demo
          }, 1200);
        } else {
          persistRemember(email, false); // se falhou, não mantém lembrete
          showMessage(result.message, true);
          btn.disabled = false;
          btn.textContent = originalText;
          passwordInput.value = ''; // limpar senha por segurança simulada
          passwordInput.focus();
        }
      } catch (err) {
        showMessage('Erro de conexão. Tente novamente.', true);
        btn.disabled = false;
        btn.textContent = originalText;
      }
    });

    // link "Esqueceu a senha" (simulação de recuperação)
    const forgotLink = document.getElementById('forgotPasswordLink');
    if (forgotLink) {
      forgotLink.addEventListener('click', (e) => {
        e.preventDefault();
        alert('🔐 Funcionalidade de recuperação de senha.\nEm breve integração com e-mail de redefinição.');
      });
    }

    // Carregar email lembrado ao iniciar a página
    loadRememberedEmail();

    // pequeno efeito para foco visual
    const inputs = document.querySelectorAll('input');
    inputs.forEach(input => {
      input.addEventListener('focus', () => {
        input.parentElement?.classList.add('focused');
      });
      input.addEventListener('blur', () => {
        input.parentElement?.classList.remove('focused');
      });
    });
  })();
</script>
</body>
</html>
