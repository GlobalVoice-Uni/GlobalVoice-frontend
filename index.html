<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VozGlobal - Componentes de Interface</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- 
        Nota: Este HTML contém apenas os componentes do VozGlobal. 
        Em uma aplicação real, estes elementos seriam injetados sobre o site de reunião.
    -->

    <!-- COMPONENTE 1: BOX DE CHAT (Canto Inferior Direito) -->
    <aside class="vg-chat-container">
        <div class="vg-chat-header">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
            <span>Chat da Reunião</span>
        </div>
        
        <div class="vg-chat-messages">
            <!-- Exemplo de Mensagem 1 -->
            <div class="vg-message">
                <span class="sender">User1 (Português):</span>
                <p>Precisamos finalizar hoje.</p>
                <span class="translation">EN: We need to finish today.</span>
            </div>
            
            <!-- Exemplo de Mensagem 2 -->
            <div class="vg-message">
                <span class="sender">User2 (English):</span>
                <p>I agree, let's complete it.</p>
                <span class="translation">PT: Eu concordo, vamos completar isso.</span>
            </div>

        <div class="vg-chat-input-area">
            <input type="text" class="vg-chat-input" placeholder="Digite uma mensagem...">
            <button class="vg-send-btn">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
            </button>
        </div>
    </aside>

    <!-- COMPONENTE 2: BARRA DE FERRAMENTAS INFERIOR -->
    <nav class="vg-toolbar">
        <!-- Botão de Microfone -->
        <button class="vg-btn mic" title="Microfone">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><line x1="12" y1="19" x2="12" y2="23"></line><line x1="8" y1="23" x2="16" y2="23"></line></svg>
        </button>
        
        <!-- Botão de Tradução -->
        <button class="vg-btn" title="Tradução">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 8l6 6"></path><path d="M4 14l6-6 2-3"></path><path d="M2 5h12"></path><path d="M7 2h1"></path><path d="M22 22l-5-10-5 10"></path><path d="M14 18h6"></path></svg>
            Tradução
        </button>
        
        <!-- Botão de Idioma -->
        <button class="vg-btn" title="Idioma">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="2" y1="12" x2="22" y2="12"></line><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path></svg>
            Idioma
        </button>
        
        <!-- Botão de Participantes -->
        <button class="vg-btn" title="Participantes">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
            Participantes
        </button>
        
        <!-- Botão de Chat (Ativo) -->
        <button class="vg-btn active" title="Chat">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path></svg>
            Chat
        </button>
        
        <!-- Botão de Gravar -->
        <button class="vg-btn" title="Gravar">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><circle cx="12" cy="12" r="3"></circle></svg>
            Gravar
        </button>
    </nav>
    <script src="script.js"></script>
</body>
</html>
