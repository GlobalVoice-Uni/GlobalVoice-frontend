<!-- index.html -->
<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Global Voice</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- HEADER -->
  <header class="header">
    <div class="logo">🌍 Global Voice</div>
    <div class="title">Reunião Internacional</div>
    <div class="actions">
      <button class="icon">🎤</button>
      <button class="icon">📹</button>
      <button class="icon">⚙️</button>
      <button class="exit">Sair</button>
    </div>
  </header>

  <!-- MAIN -->
  <main class="container">

    <!-- VIDEOS -->
    <section class="video-grid">
      <div class="card">
        <img src="https://randomuser.me/api/portraits/men/32.jpg">
        <div class="info">🇧🇷 Carlos (PT)</div>
        <div class="status speaking">Falando</div>
      </div>

      <div class="card">
        <img src="https://randomuser.me/api/portraits/women/44.jpg">
        <div class="info">🇺🇸 Anna (EN)</div>
        <div class="status listening">Ouvindo</div>
      </div>

      <div class="card">
        <img src="https://randomuser.me/api/portraits/men/65.jpg">
        <div class="info">🇯🇵 Kenji</div>
      </div>

      <div class="card">
        <img src="https://randomuser.me/api/portraits/women/68.jpg">
        <div class="info">🇪🇸 Maria</div>
      </div>
    </section>

    <!-- CHAT -->
    <aside class="chat">
      <div class="chat-header">💬 Chat da Reunião</div>

      <div class="chat-messages">
        <div class="message">
          <strong>Carlos:</strong> Precisamos finalizar hoje
          <div class="translation">EN: We need to finish today</div>
        </div>

        <div class="message">
          <strong>Anna:</strong> I agree!
        </div>

        <div class="message">
          <strong>Kenji:</strong> はい
        </div>
      </div>

      <div class="input">
        <input placeholder="Digite uma mensagem...">
        <button>➤</button>
      </div>
    </aside>

  </main>

  <!-- FOOTER -->
  <footer class="footer">
    <button class="btn">🎤</button>
    <button class="btn">🌐 Tradução</button>
    <button class="btn">👥 Participantes</button>
    <button class="btn">💬 Chat</button>
    <button class="btn">⏺️ Gravar</button>
  </footer>

</body>
</html>
