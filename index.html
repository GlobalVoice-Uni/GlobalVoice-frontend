<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>GlobalVoice · Login</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="login-card">
  <div class="login-header">
    <h1>GlobalVoice</h1>
    <div class="sub">Acesse sua conta</div>
  </div>

  <form id="loginForm" action="#" method="post">
    <div class="input-group">
      <label for="email">Email</label>
      <input type="email" id="email" name="email" placeholder="usuario@exemplo.com" autocomplete="email" required>
    </div>

    <div class="input-group">
      <label for="password">Senha</label>
      <input type="password" id="password" name="password" placeholder="••••••••" autocomplete="current-password" required>
    </div>

    <div class="options-row">
      <label class="checkbox-label">
        <input type="checkbox" id="remember" name="remember">
        <span>Lembrar-me</span>
      </label>
      <a href="#" class="forgot-link" id="forgotPasswordLink">Esqueceu a senha?</a>
    </div>

    <button type="submit" class="login-btn">Login</button>

    <div id="formFeedback" style="text-align: center; font-size: 0.8rem; color: #b91c1c; min-height: 1.6rem;"></div>
  </form>

  <div class="demo-note">
    🔐 Credenciais demo: <strong>demo@globalvoice.com</strong> / qualquer senha (6+ caracteres)
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
